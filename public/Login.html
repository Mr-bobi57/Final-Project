<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">

  <title>Login Form</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
    background-image: url('cvr3.png');
    background-size: cover;
    background-position: center;  
    background-repeat: no-repeat; 
    background-attachment: fixed;  
    margin: 0;
    overflow-x: hidden;
    color: #fff;
}
    
    /* NAVBAR */
    .navbar {
      width: 100%;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
    }

    .navbar h1 {
      margin: 0;
      font-size: 20px;
      color: #fff;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #00ff7f;
    }

    .container {
    height: 100vh;
    display: flex;
    padding-top: 75px;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #02061798 50%, transparent);
}
    .login-box {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      width: 350px;
      padding: 40px 30px;
      color: #fff;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    

    .input-box {
      position: relative;
      margin-bottom: 25px;
      
      
    }

    .input-box input {
      width: 100%;
      padding: 12px 15px;
      border: none;
      outline: none;
      border-radius: 8px;
      background: rgba(202, 200, 200, 0.2);
      color: #fff;
      font-size: 15px;
      transition: 0.3s;
      text-decoration-color: aliceblue;
    }

    .input-box input:focus {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    .links {
      text-align: center;
      margin-top: 20px;
    }

    .links a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    .links a:hover {
      text-decoration: underline;
    }
    
  </style>
</head>
<body>
  

  <!-- NAVBAR -->
  <div class="navbar">
    <h1>EverGreen Futsal</h1>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="Register.html">Register</a>
      
    </div>
  </div>
  <div class="container">
  <div class="login-box">
    <h2>Login</h2>
    <form>
      <div class="input-box">
        <input type="text" placeholder="Username" required />
      </div>
      <div class="input-box">
        <input type="password" placeholder="Password" required />
      </div>
      <button type="submit" class="btn">Sign In</button>
      <div class="links">
        <a href="#">Forgot password?</a>
      </div>
      <br>
        <hr>
      <div class="links">
          <p>Don't have an account? <a href="Register.html">Register</a></p>
        </div>
    </form>
  </div>
  </div>
</body>
</html>
