<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking page</title>
</head>
<body>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

body{
    color:white;
    background-image: url('bgndimg.png');
    background-size: cover;
    background-position: center;  
    background-repeat: no-repeat; 
    background-attachment: fixed;  
    overflow-x:hidden;
}

/* Loader */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:0.8s;
}

.loader.hidden{
opacity:0;
pointer-events:none;
}
.loader-circle{
width:60px;
height:60px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #10b981;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* Navbar */
nav{
position:fixed;
display: flex;
top:0;
width:100%;
backdrop-filter: blur(10px);
background:rgba(0,0,0,0.3);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:100;
}

.nav-container{
    max-width:1200px;
    width:100%; 
    margin:auto;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
     text-decoration: none;
}


.btn{
    display: inline-block;  
    padding:10px 20px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    text-decoration:none;   
}
.logo{
font-weight:700;
}

.nav-links{
display:flex;
gap:30px;
color:#94a3b8;
}
.nav-links a{
    text-decoration:none;
    color:#94a3b8;
    font-weight:500;
    transition:0.3s;
}

.nav-links a:hover{
    color:#10b981;
}

.btn{
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-primary{
    background: linear-gradient(45deg, #00ff7f, #d2d5d2);
    color: black;
    margin-right: 10px;
}

.btn-light{
    background: linear-gradient(45deg, #0ed0ca, #d2d5d2);
    color:black;
}

</style>








<div class="loader">
<div class="loader-circle"></div>
</div>

<nav>
<div class="nav-container">
<div class="logo">Ever Green Sports Complex</div>
<div class="nav-links">
<a href="#home">Home</a>
<a href="#location">Location</a>
<a href="#contact">Contact</a>
</div>
<div>
<a href="#" class="btn btn-primary">Book Now</a>
<a href="Login.html" class="btn btn-light">Login</a>
</div>
</div>
</nav>




</body>
</html>
